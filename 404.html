<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>MindShant</title>
  <script>
    // GitHub Pages SPA redirect
    // Stores the full URL and redirects to index.html
    var l = window.location;
    var basePath = '/mindshant';
    var path = l.pathname.slice(basePath.length) || '/';
    var search = l.search;
    var hash = l.hash;
    sessionStorage.setItem('spa_redirect', JSON.stringify({
      path: path,
      search: search,
      hash: hash
    }));
    l.replace(basePath + '/?p=' + encodeURIComponent(path + search + hash));
  </script>
</head>
<body></body>
</html>
