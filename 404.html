<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>MindShant</title>
<script>
  var l = window.location;
  var base = '/mindshant';
  var path = l.pathname.slice(base.length) || '/';
  sessionStorage.setItem('spa_redirect', path + l.search + l.hash);
  l.replace(base + '/?r=' + encodeURIComponent(path + l.search + l.hash));
</script>
</head><body></body></html>
